<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <h1>My list</h1>
    <h2>Unordered</h2>
    <ul>
        <li>1</li>
        <ol>
            <li>A1</li>
            <li>A2</li>
        </ol>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
    </ul>
    <h2>Ordered List</h2>
    <ol>
        <li>one</li>
        <li>two</li>
        <li>three</li>
    </ol>
    <dl>
        <dt>ICE TEA</dt>
        <dd>leamon Ice tea</dd>
        <dt>hot TEA</dt>
        <dd> hot  leamon Ice tea</dd>
    </dl>
</body>
</html>
