<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
    <style>
        table{
            width:100%;
            border-collapse: collapse;
            
        }
        td,th{
            border: 1px solid black;
            padding:10px;
        }
        tr:nth-child(even){
            background-color: #616161;
        }
    </style> 
</head>
<body>
    <table style="width:100;">
        <colgroup>  
            <col span="2" style="background-color: rgb(30, 180, 210);"/>
        </colgroup>
        <tr>
            <th>Country</th>
            <th>CountryCode</th>
            <th>Email</th>
        </tr>
        <tr>
            <td>India</td>
            <td>IN</INp></td>
            <td>india@gmail.com</td>
        </tr>
        <tr>
            <td>United states of america</td>
            <td>USA</INp></td>
            <td>usa@gmail.com</td>
        </tr>
        <tr>
            <td>China</td>
            <td>CN</INp></td>
            <td>cn@gmail.com</td>
        </tr>
        <tr>
            <td>Japan</td>
            <td>JP</INp></td>
            <td>jp@gmail.com</td>
        </tr>
<table>
        <tr>
            <th colspan="3">Country</th>
            <td>India</td>
            <td>Japan</td>
        </tr>
        <tr>
            <th>countrycode</th>
            <td>IN</td>
            <td>JP</td>
        </tr>
    </table>
</body>
</html>
